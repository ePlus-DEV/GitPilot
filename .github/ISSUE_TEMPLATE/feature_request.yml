name: Feature request
description: Suggest an improvement or new capability for GitPilot
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, or links if helpful.
