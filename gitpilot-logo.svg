<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Emblem background: deep navy with subtle blue warmth -->
    <radialGradient id="emblemBg" cx="44%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#16223a"/>
      <stop offset="100%" stop-color="#080d16"/>
    </radialGradient>

    <!-- Outer rim: teal → violet arc gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.75"/>
      <stop offset="45%"  stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.45"/>
    </linearGradient>

    <!-- Teal node glow -->
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Violet node glow -->
    <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle inner vignette on emblem -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- ── EMBLEM (circle, 160×160) ── -->
  <g transform="translate(0, 0)">
    <!-- Outer rim glow (blurred duplicate ring) -->
    <circle cx="80" cy="80" r="72" fill="none"
            stroke="url(#rimGrad)" stroke-width="6" opacity="0.3"
            filter="url(#softBlur)"/>

    <!-- Main circle background -->
    <circle cx="80" cy="80" r="70" fill="url(#emblemBg)"/>

    <!-- Rim stroke (crisp) -->
    <circle cx="80" cy="80" r="70" fill="none"
            stroke="url(#rimGrad)" stroke-width="1.2"/>

    <!-- Vignette overlay -->
    <circle cx="80" cy="80" r="70" fill="url(#vignette)"/>

    <!-- ── GIT GRAPH (main lane x=72, feature lane x=96) ── -->

    <!-- Main lane continuation lines (teal) -->
    <line x1="72" y1="15" x2="72" y2="46"
          stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="72" y1="57" x2="72" y2="97"
          stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="72" y1="110" x2="72" y2="145"
          stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

    <!-- Feature lane line (violet) -->
    <line x1="96" y1="67" x2="96" y2="91"
          stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

    <!-- Fork bezier: main (72,46) → feature (96,67) -->
    <!-- mx = (72+96)/2 = 84  -->
    <path d="M 72 46 C 84 46 84 67 96 67"
          stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75"/>

    <!-- Merge bezier: feature (96,91) → main (72,110) -->
    <!-- mx = 84 -->
    <path d="M 96 91 C 84 91 84 110 72 110"
          stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75"/>

    <!-- ── NODES ── (glow ring → outer fill → dark core → inner color) -->

    <!-- Node A: main top (72, 30) — teal, small -->
    <circle cx="72" cy="30" r="9"  fill="#38bdf8" opacity="0.11"/>
    <circle cx="72" cy="30" r="4.5" fill="#38bdf8"/>
    <circle cx="72" cy="30" r="2.8" fill="#080d16"/>
    <circle cx="72" cy="30" r="2.8" fill="#38bdf8" opacity="0.55"/>

    <!-- Node B: fork commit (72, 52) — teal -->
    <circle cx="72" cy="52" r="9"  fill="#38bdf8" opacity="0.11"/>
    <circle cx="72" cy="52" r="4.5" fill="#38bdf8"/>
    <circle cx="72" cy="52" r="2.8" fill="#080d16"/>
    <circle cx="72" cy="52" r="2.8" fill="#38bdf8" opacity="0.55"/>

    <!-- Node C: feature HEAD (96, 79) — violet, larger, HEAD ring -->
    <circle cx="96" cy="79" r="14"  fill="#a78bfa" opacity="0.12" filter="url(#softBlur)"/>
    <circle cx="96" cy="79" r="10"  fill="#a78bfa" opacity="0.13"/>
    <circle cx="96" cy="79" r="5.5" fill="#a78bfa"/>
    <circle cx="96" cy="79" r="3.5" fill="#080d16"/>
    <circle cx="96" cy="79" r="3.5" fill="#a78bfa" opacity="0.55"/>
    <!-- HEAD ring -->
    <circle cx="96" cy="79" r="8.5" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.85"/>

    <!-- Node D: merge commit (72, 104) — teal, merge ring -->
    <circle cx="72" cy="104" r="9"  fill="#38bdf8" opacity="0.11"/>
    <circle cx="72" cy="104" r="4.5" fill="#38bdf8"/>
    <circle cx="72" cy="104" r="2.8" fill="#080d16"/>
    <circle cx="72" cy="104" r="2.8" fill="#38bdf8" opacity="0.55"/>
    <circle cx="72" cy="104" r="7"  fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.45"/>

    <!-- Node E: main bottom (72, 128) — teal, small, current -->
    <circle cx="72" cy="128" r="9"  fill="#38bdf8" opacity="0.11"/>
    <circle cx="72" cy="128" r="4.5" fill="#38bdf8"/>
    <circle cx="72" cy="128" r="2.8" fill="#080d16"/>
    <circle cx="72" cy="128" r="2.8" fill="#38bdf8" opacity="0.55"/>

    <!-- Tiny emerald accent dot — "active" signal bottom-right of emblem -->
    <circle cx="116" cy="118" r="3.5" fill="#34d399" opacity="0.85"/>
    <circle cx="116" cy="118" r="6.5" fill="#34d399" opacity="0.18"/>
  </g>

  <!-- ── WORDMARK ── -->
  <g transform="translate(178, 0)">

    <!-- "git" — thin, cool gray, lowercase -->
    <text
      x="0" y="78"
      font-family="'SF Pro Display', 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif"
      font-size="48"
      font-weight="300"
      letter-spacing="-0.5"
      fill="#64748b"
      dominant-baseline="auto">git</text>

    <!-- "PILOT" — bold, near-white, uppercase -->
    <text
      x="0" y="122"
      font-family="'SF Pro Display', 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif"
      font-size="48"
      font-weight="700"
      letter-spacing="3"
      fill="#f1f5f9"
      dominant-baseline="auto">PILOT</text>

    <!-- Teal underline accent under PILOT -->
    <rect x="0" y="128" width="228" height="2" rx="1"
          fill="url(#rimGrad)" opacity="0.7"/>

    <!-- Tagline -->
    <text
      x="0" y="148"
      font-family="'SF Pro Display', 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif"
      font-size="11"
      font-weight="400"
      letter-spacing="2.5"
      fill="#38bdf8"
      opacity="0.65"
      dominant-baseline="auto">VISUAL GIT CLIENT</text>
  </g>
</svg>
